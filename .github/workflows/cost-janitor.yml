name: Cost Janitor CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  cost-janitor:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install boto3 awscli-local terraform-local
          pip install -r janitor/requirements.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Start LocalStack
        run: |
          pip install localstack
          docker pull localstack/localstack:3.0.0
          docker run -d -p 4566:4566 --name localstack localstack/localstack:3.0.0
          echo "Waiting for LocalStack..."
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q "running"; then
              echo "LocalStack is ready!"
              break
            fi
            echo "Attempt $i: not ready yet..."
            sleep 10
          done
          curl -s http://localhost:4566/_localstack/health

      - name: Terraform Init and Apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          tflocal init
          tflocal apply -auto-approve

      - name: Run Cost Janitor
        working-directory: janitor
        run: |
          python3 janitor.py --dry-run --output report.json || echo "ORPHANS_FOUND=true" >> $GITHUB_ENV

      - name: Generate Markdown Summary
        working-directory: janitor
        run: python3 generate_summary.py

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cost-janitor-report
          path: |
            janitor/report.json
            janitor/summary.md

      - name: Post PR comment if orphans found
        if: github.event_name == 'pull_request' && env.ORPHANS_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const summary = fs.readFileSync("janitor/summary.md", "utf8");
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
